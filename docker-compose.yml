services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: seomachine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/seomachine
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me
      SETTINGS_ENCRYPTION_KEY: dev-encryption-key-change-me-32-chars
      PYTHONPATH: /app/backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/seomachine
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: dev-secret-change-me
      SETTINGS_ENCRYPTION_KEY: dev-encryption-key-change-me-32-chars
      PYTHONPATH: /app/backend:/app
    depends_on:
      - postgres
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
